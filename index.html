<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Bucket Browser</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        .download-btn { cursor: pointer; color: #0066cc; text-decoration: underline; background: none; border: none; padding: 0; font: inherit; }
        .loading { font-style: italic; color: #666; }
        .error { color: #cc0000; font-weight: bold; }
        .size { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Bucket Files</h1>
    <div id="status"></div>
    <table id="file-table" style="display:none;">
        <thead>
            <tr>
                <th>File Name</th>
                <th>Size</th>
                <th>Last Modified</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="file-list"></tbody>
    </table>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e54fnlggbipdrp6c19';

        async function fetchFiles() {
            const statusDiv = document.getElementById('status');
            const table = document.getElementById('file-table');
            const tbody = document.getElementById('file-list');

            statusDiv.className = 'loading';
            statusDiv.textContent = 'Loading file list...';

            try {
                const response = await fetch(`${API_URL}?list=true`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const files = await response.json();

                if (files.length === 0) {
                    statusDiv.textContent = 'Bucket is empty.';
                    return;
                }

                tbody.innerHTML = '';
                files.forEach(file => {
                    const row = document.createElement('tr');

                    const nameCell = document.createElement('td');
                    nameCell.textContent = file.name;

                    const sizeCell = document.createElement('td');
                    sizeCell.className = 'size';
                    sizeCell.textContent = formatBytes(file.size);

                    const dateCell = document.createElement('td');
                    dateCell.textContent = new Date(file.last_modified).toLocaleString();

                    const actionCell = document.createElement('td');
                    const btn = document.createElement('button');
                    btn.className = 'download-btn';
                    btn.textContent = 'Download';
                    btn.onclick = () => downloadFile(file.name);
                    actionCell.appendChild(btn);

                    row.appendChild(nameCell);
                    row.appendChild(sizeCell);
                    row.appendChild(dateCell);
                    row.appendChild(actionCell);
                    tbody.appendChild(row);
                });

                statusDiv.textContent = '';
                table.style.display = 'table';
            } catch (error) {
                console.error('Fetch error:', error);
                statusDiv.className = 'error';
                statusDiv.textContent = `Error loading files: ${error.message}`;
            }
        }

        async function downloadFile(filename) {
            try {
                const response = await fetch(`${API_URL}?download=${encodeURIComponent(filename)}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                if (data.download_url) {
                    window.location.href = data.download_url;
                } else {
                    alert('Could not get download URL');
                }
            } catch (error) {
                console.error('Download error:', error);
                alert(`Error initiating download: ${error.message}`);
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        fetchFiles();
    </script>
</body>
</html>
