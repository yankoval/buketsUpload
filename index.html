<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket File Browser</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        h1 { color: #333; }
        .breadcrumb { margin-bottom: 1rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #0066cc; }
        .breadcrumb a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        .folder-link { cursor: pointer; color: #0066cc; font-weight: bold; text-decoration: none; }
        .download-btn { cursor: pointer; color: #0066cc; text-decoration: underline; background: none; border: none; padding: 0; font: inherit; }
        .loading { font-style: italic; color: #666; }
        .error { color: #cc0000; font-weight: bold; }
        .size { color: #666; font-size: 0.9rem; }
        .icon { margin-right: 8px; }
        .set-tag-btn {
            cursor: pointer;
            color: #4caf50;
            background: none;
            border: 1px solid #4caf50;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .set-tag-btn:hover { background: #e8f5e9; }
        .tag {
            display: inline-flex;
            align-items: center;
            background: #e1f5fe;
            color: #01579b;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-right: 4px;
        }
        .remove-tag-btn {
            cursor: pointer;
            margin-left: 6px;
            color: #d32f2f;
            font-weight: bold;
            border: none;
            background: none;
            padding: 0;
            font-size: 1.1rem;
            line-height: 1;
        }
        .remove-tag-btn:disabled {
            color: #9e9e9e;
            cursor: not-allowed;
        }
        .sortable {
            cursor: pointer;
            user-select: none;
        }
        .sortable:hover {
            background-color: #eee;
        }
        .sort-icon {
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .upload-section {
            background: #f9f9f9;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .filter-controls input {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .filter-controls button {
            background: #8bc34a;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-controls button:hover { background: #7cb342; }
        .upload-section input[type="file"] { margin-bottom: 10px; }
        .upload-section button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .upload-section button:hover { background: #45a049; }
        .upload-section button:disabled { background: #ccc; cursor: not-allowed; }

        .filter-section {
            background: #f1f8e9;
            padding: 1rem;
            border: 1px solid #c5e1a5;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            background: #fff;
            border: 1px solid #8bc34a;
            color: #33691e;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.9rem;
            margin: 4px;
            cursor: default;
        }
        .remove-filter-btn {
            cursor: pointer;
            margin-left: 8px;
            color: #7cb342;
            font-weight: bold;
            border: none;
            background: none;
            padding: 0;
            font-size: 1rem;
        }
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .filter-header h3 { margin: 0; }
        .clickable-tag { cursor: pointer; border: 1px solid transparent; transition: border 0.2s; }
        .clickable-tag:hover { border-color: #0288d1; }

        .refresh-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .yin-yang-btn {
            width: 100px;
            height: 100px;
            background: linear-gradient(to right, #a2d149 50%, #3e6b21 50%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            border: 2px solid #3e6b21;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s ease, filter 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .yin-yang-btn:hover:not(:disabled) {
            transform: rotate(180deg);
        }
        .yin-yang-btn:disabled {
            cursor: not-allowed;
            filter: grayscale(1) opacity(0.6);
        }
        .yin-yang-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 25px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #3e6b21 20%, #a2d149 21%);
            border-radius: 50%;
        }
        .yin-yang-btn::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #a2d149 20%, #3e6b21 21%);
            border-radius: 50%;
        }
        .timer-display {
            position: relative;
            z-index: 10;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="refresh-container">
        <button id="refresh-btn" class="yin-yang-btn" onclick="manualRefresh()">
            <span id="refresh-timer" class="timer-display"></span>
        </button>
    </div>

    <h1>Bucket Browser</h1>

    <div class="upload-section">
        <h3>Upload File</h3>
        <input type="file" id="file-input">
        <button id="upload-btn" onclick="uploadFile()">Upload</button>
        <div id="upload-status"></div>
    </div>

    <div class="filter-section" id="filter-section">
        <div class="filter-header">
            <h3>Filters</h3>
            <button onclick="clearFilters()" style="font-size: 0.8rem;">Clear All</button>
        </div>
        <div class="filter-controls">
            <input type="text" id="filter-key" placeholder="Tag Key (e.g. status)">
            <input type="text" id="filter-val" placeholder="Tag Value (e.g. error)">
            <button onclick="addManualFilter()">Add Tag Filter</button>
        </div>
        <div class="filter-controls">
            <input type="text" id="filter-name" placeholder="Name Filter (regex)" oninput="updateNameFilter(this.value)">
            <input type="text" id="filter-date" placeholder="Last Modified Filter (regex)" oninput="updateDateFilter(this.value)">
        </div>
        <div id="active-filters"></div>
        <small style="color: #666;">Click on a tag in the table to quickly add a filter.</small>
    </div>

    <div id="breadcrumb" class="breadcrumb"></div>
    <div id="status"></div>

    <table id="file-table" style="display:none;">
        <thead>
            <tr>
                <th class="sortable" onclick="toggleSort('name')">Name <span id="sort-name" class="sort-icon"></span></th>
                <th>Size</th>
                <th class="sortable" onclick="toggleSort('last_modified')">Last Modified <span id="sort-last_modified" class="sort-icon"></span></th>
                <th>Tags</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="file-list"></tbody>
    </table>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e54fnlggbipdrp6c19';
        let allowedTags = ['error', 'finished'];
        let activeFilters = {}; // { key: [values] }
        let nameFilter = '';
        let dateFilter = '';
        let sortConfig = { key: null, order: null }; // order: 'asc', 'desc', null
        let refreshTimerInterval = null;

        let configLoaded = false;
        async function fetchConfig() {
            if (configLoaded) return;
            try {
                const response = await fetch(`${API_URL}?download=config/UI-conf.json`);
                if (!response.ok) return;
                const data = await response.json();
                if (data.download_url) {
                    const configResponse = await fetch(data.download_url);
                    if (configResponse.ok) {
                        const configData = await configResponse.json();
                        if (configData && Array.isArray(configData.allowed_delete_tags)) {
                            allowedTags = configData.allowed_delete_tags;
                            configLoaded = true;
                        }
                    }
                }
            } catch (e) {
                console.error("Failed to fetch UI-conf.json, using defaults", e);
            }
        }

        function loadSettings() {
            const folder = getCurrentFolder();
            updateRefreshButtonUI();

            // Load Tags Filters
            const savedFilters = localStorage.getItem(`filters_${folder}`);
            if (savedFilters) {
                try { activeFilters = JSON.parse(savedFilters); } catch (e) { activeFilters = {}; }
            } else { activeFilters = {}; }

            // Load Name/Date Filters
            nameFilter = localStorage.getItem(`nameFilter_${folder}`) || '';
            dateFilter = localStorage.getItem(`dateFilter_${folder}`) || '';
            document.getElementById('filter-name').value = nameFilter;
            document.getElementById('filter-date').value = dateFilter;

            // Load Sort
            const savedSort = localStorage.getItem(`sort_${folder}`);
            if (savedSort) {
                try { sortConfig = JSON.parse(savedSort); } catch (e) { sortConfig = { key: null, order: null }; }
            } else { sortConfig = { key: null, order: null }; }

            updateFilterUI();
            updateSortUI();
        }

        function saveSettings() {
            const folder = getCurrentFolder();
            localStorage.setItem(`filters_${folder}`, JSON.stringify(activeFilters));
            localStorage.setItem(`nameFilter_${folder}`, nameFilter);
            localStorage.setItem(`dateFilter_${folder}`, dateFilter);
            localStorage.setItem(`sort_${folder}`, JSON.stringify(sortConfig));
            updateFilterUI();
            updateSortUI();
        }

        function updateNameFilter(val) {
            nameFilter = val;
            saveSettings();
            fetchItems();
        }

        function updateDateFilter(val) {
            dateFilter = val;
            saveSettings();
            fetchItems();
        }

        function toggleSort(key) {
            if (sortConfig.key === key) {
                if (sortConfig.order === 'asc') sortConfig.order = 'desc';
                else if (sortConfig.order === 'desc') {
                    sortConfig.order = null;
                    sortConfig.key = null;
                }
            } else {
                sortConfig.key = key;
                sortConfig.order = 'asc';
            }
            saveSettings();
            fetchItems();
        }

        function updateSortUI() {
            const sortName = document.getElementById('sort-name');
            const sortDate = document.getElementById('sort-last_modified');
            if (sortName) sortName.textContent = '';
            if (sortDate) sortDate.textContent = '';
            if (sortConfig.key) {
                const icon = sortConfig.order === 'asc' ? '↑' : '↓';
                const el = document.getElementById(`sort-${sortConfig.key}`);
                if (el) el.textContent = icon;
            }
        }

        function addManualFilter() {
            const key = document.getElementById('filter-key').value.trim();
            const val = document.getElementById('filter-val').value.trim();
            if (key && val) {
                addFilter(key, val);
                document.getElementById('filter-key').value = '';
                document.getElementById('filter-val').value = '';
            } else {
                alert('Both Tag Key and Tag Value are required.');
            }
        }

        function updateFilterUI() {
            const container = document.getElementById('active-filters');
            container.innerHTML = '';

            const keys = Object.keys(activeFilters);
            if (keys.length === 0) {
                container.innerHTML = '<p style="color: #666; font-style: italic;">No active filters.</p>';
                return;
            }

            keys.forEach(key => {
                activeFilters[key].forEach(val => {
                    const chip = document.createElement('div');
                    chip.className = 'filter-chip';
                    chip.innerHTML = `<strong>${key}:</strong> ${val}`;

                    const btn = document.createElement('button');
                    btn.className = 'remove-filter-btn';
                    btn.innerHTML = '&times;';
                    btn.onclick = () => removeFilter(key, val);

                    chip.appendChild(btn);
                    container.appendChild(chip);
                });
            });
        }

        function addFilter(key, value) {
            if (!activeFilters[key]) activeFilters[key] = [];
            if (!activeFilters[key].includes(value)) {
                activeFilters[key].push(value);
                saveSettings();
                fetchItems();
            }
        }

        function removeFilter(key, value) {
            if (activeFilters[key]) {
                activeFilters[key] = activeFilters[key].filter(v => v !== value);
                if (activeFilters[key].length === 0) delete activeFilters[key];
                saveSettings();
                fetchItems();
            }
        }

        function clearFilters() {
            activeFilters = {};
            nameFilter = '';
            dateFilter = '';
            document.getElementById('filter-name').value = '';
            document.getElementById('filter-date').value = '';
            saveSettings();
            fetchItems();
        }

        // Get folder from URL hash
        function getCurrentFolder() {
            const hash = window.location.hash.substring(1); // remove '#'
            const params = new URLSearchParams(hash);
            return params.get('folder') || '';
        }

        function updateBreadcrumb(folder) {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<a href="#">Root</a>';

            if (folder) {
                const parts = folder.split('/').filter(p => p);
                let path = '';
                parts.forEach((part, index) => {
                    path += part + '/';
                    html += ` / <a href="#folder=${encodeURIComponent(path)}">${part}</a>`;
                });
            }
            breadcrumb.innerHTML = html;
        }

        async function manualRefresh() {
            const success = await fetchItems(true);
            if (success) {
                startTimer();
            }
        }

        function startTimer() {
            const folder = getCurrentFolder();
            const endTime = Date.now() + 120000;
            localStorage.setItem(`refreshTimer_${folder}`, endTime);
            updateRefreshButtonUI();
        }

        function updateRefreshButtonUI() {
            const folder = getCurrentFolder();
            const btn = document.getElementById('refresh-btn');
            const timerSpan = document.getElementById('refresh-timer');

            if (refreshTimerInterval) clearInterval(refreshTimerInterval);

            const update = () => {
                const endTime = localStorage.getItem(`refreshTimer_${folder}`);
                if (endTime) {
                    const remaining = Math.ceil((parseInt(endTime) - Date.now()) / 1000);
                    if (remaining > 0) {
                        btn.disabled = true;
                        timerSpan.textContent = remaining;
                        return;
                    }
                }
                btn.disabled = false;
                timerSpan.textContent = '';
                if (refreshTimerInterval) {
                    clearInterval(refreshTimerInterval);
                    refreshTimerInterval = null;
                }
            };

            update();
            refreshTimerInterval = setInterval(update, 1000);
        }

        async function fetchItems(isManual = false) {
            const currentFolder = getCurrentFolder();
            updateBreadcrumb(currentFolder);
            await fetchConfig();
            if (!isManual) loadSettings();

            const statusDiv = document.getElementById('status');
            const table = document.getElementById('file-table');
            const tbody = document.getElementById('file-list');

            statusDiv.className = 'loading';
            statusDiv.textContent = 'Loading items...';
            table.style.display = 'none';

            try {
                let url = `${API_URL}?list=true`;
                if (currentFolder) {
                    url += `&folder=${encodeURIComponent(currentFolder)}`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                let items = await response.json();

                // Apply Tag Filters
                const filterKeys = Object.keys(activeFilters);
                if (filterKeys.length > 0) {
                    items = items.filter(item => {
                        if (item.type !== 'file') return true;
                        if (!item.tags) return false;

                        return filterKeys.every(fk => {
                            const itemTagValue = item.tags[fk];
                            if (!itemTagValue) return false;
                            return activeFilters[fk].includes(itemTagValue);
                        });
                    });
                }

                // Apply Name Filter (Regex)
                if (nameFilter) {
                    try {
                        const regex = new RegExp(nameFilter, 'i');
                        items = items.filter(item => {
                            if (item.type !== 'file') return true;
                            const relativeName = item.name.replace(currentFolder, '');
                            return regex.test(relativeName);
                        });
                    } catch (e) {
                        console.error("Invalid Name Regex", e);
                    }
                }

                // Apply Date Filter (Regex)
                if (dateFilter) {
                    try {
                        const regex = new RegExp(dateFilter, 'i');
                        items = items.filter(item => {
                            if (item.type !== 'file') return true;
                            const dateStr = new Date(item.last_modified).toLocaleString();
                            return regex.test(dateStr);
                        });
                    } catch (e) {
                        console.error("Invalid Date Regex", e);
                    }
                }

                // Apply Sorting
                if (sortConfig.key && sortConfig.order) {
                    items.sort((a, b) => {
                        // Keep folders always at the top, or maybe just sort files?
                        // Usually folders and files are sorted separately or together.
                        // Let's sort them together but we can decide.
                        if (a.type === 'folder' && b.type !== 'folder') return -1;
                        if (a.type !== 'folder' && b.type === 'folder') return 1;

                        let valA = a[sortConfig.key];
                        let valB = b[sortConfig.key];

                        if (sortConfig.key === 'name') {
                            valA = valA.toLowerCase();
                            valB = valB.toLowerCase();
                        }

                        if (valA < valB) return sortConfig.order === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.order === 'asc' ? 1 : -1;
                        return 0;
                    });
                }

                tbody.innerHTML = '';

                // Handle Parent directory if not in root
                if (currentFolder) {
                    const parentFolder = currentFolder.split('/').filter(p => p).slice(0, -1).join('/') + (currentFolder.includes('/') && currentFolder.split('/').filter(p => p).length > 1 ? '/' : '');
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td colspan="5">
                            <a class="folder-link" href="#folder=${encodeURIComponent(parentFolder)}">
                                <span class="icon">📁</span>.. (Parent Directory)
                            </a>
                        </td>
                    `;
                    tbody.appendChild(row);
                }

                if (items.length === 0 && !currentFolder) {
                    statusDiv.textContent = 'Bucket is empty.';
                    return;
                }

                items.forEach(item => {
                    const row = document.createElement('tr');

                    const nameCell = document.createElement('td');
                    if (item.type === 'folder') {
                        const link = document.createElement('a');
                        link.className = 'folder-link';
                        link.href = `#folder=${encodeURIComponent(item.name)}`;
                        link.innerHTML = `<span class="icon">📁</span>${item.name.replace(currentFolder, '')}`;
                        nameCell.appendChild(link);
                    } else {
                        nameCell.innerHTML = `<span class="icon">📄</span>${item.name.replace(currentFolder, '')}`;
                    }

                    const sizeCell = document.createElement('td');
                    sizeCell.className = 'size';
                    sizeCell.textContent = item.type === 'file' ? formatBytes(item.size) : '-';

                    const dateCell = document.createElement('td');
                    dateCell.textContent = item.type === 'file' ? new Date(item.last_modified).toLocaleString() : '-';

                    const tagsCell = document.createElement('td');
                    if (item.type === 'file' && item.tags) {
                        Object.entries(item.tags).forEach(([key, value]) => {
                            const tagSpan = document.createElement('span');
                            tagSpan.className = 'tag clickable-tag';
                            tagSpan.textContent = `${key}: ${value}`;
                            tagSpan.onclick = () => addFilter(key, value);

                            const k = String(key).trim().toLowerCase();
                            const v = String(value).trim().toLowerCase();
                            const isAllowed = allowedTags.some(t => {
                                const s = String(t).trim().toLowerCase();
                                return s === k || s === v;
                            });

                            const removeBtn = document.createElement('button');
                            removeBtn.className = 'remove-tag-btn';
                            removeBtn.innerHTML = '&times;';

                            if (isAllowed) {
                                removeBtn.title = `Remove tag ${key}`;
                                removeBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    removeTag(item.name, key);
                                };
                            } else {
                                removeBtn.disabled = true;
                                removeBtn.title = `Tag "${key}" cannot be removed by configuration`;
                                removeBtn.onclick = (e) => e.stopPropagation();
                            }
                            tagSpan.appendChild(removeBtn);
                            tagsCell.appendChild(tagSpan);
                        });
                    } else {
                        tagsCell.textContent = '-';
                    }

                    const actionCell = document.createElement('td');
                    if (item.type === 'file') {
                        const btn = document.createElement('button');
                        btn.className = 'download-btn';
                        btn.innerHTML = '📥';
                        btn.title = 'Download';
                        btn.onclick = () => downloadFile(item.name);
                        actionCell.appendChild(btn);

                        const setTagBtn = document.createElement('button');
                        setTagBtn.className = 'set-tag-btn';
                        setTagBtn.textContent = '+ Tag';
                        setTagBtn.onclick = () => promptSetTag(item.name);
                        actionCell.appendChild(setTagBtn);
                    }

                    row.appendChild(nameCell);
                    row.appendChild(sizeCell);
                    row.appendChild(dateCell);
                    row.appendChild(tagsCell);
                    row.appendChild(actionCell);
                    tbody.appendChild(row);
                });

                statusDiv.textContent = '';
                table.style.display = 'table';
                return true;
            } catch (error) {
                console.error('Fetch error:', error);
                statusDiv.className = 'error';
                statusDiv.textContent = `Error loading items: ${error.message}`;
                return false;
            }
        }

        async function downloadFile(filename) {
            try {
                const response = await fetch(`${API_URL}?download=${encodeURIComponent(filename)}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                if (data.download_url) {
                    // Option 1: Trigger download and set tag immediately
                    window.location.href = data.download_url;

                    // Set downloadStatus: downloaded
                    const tagUrl = `${API_URL}?set_tag=${encodeURIComponent(filename)}&tag_key=downloadStatus&tag_value=downloaded`;
                    fetch(tagUrl, { method: 'POST' }).then(r => {
                        if (r.ok) fetchItems(); // Refresh to show new tag
                    }).catch(e => console.error("Failed to set downloadStatus tag", e));
                } else {
                    alert('Could not get download URL');
                }
            } catch (error) {
                console.error('Download error:', error);
                alert(`Error initiating download: ${error.message}`);
            }
        }

        async function removeTag(filename, tagKey) {
            if (!confirm(`Are you sure you want to remove tag "${tagKey}" from ${filename}?`)) return;

            try {
                const url = `${API_URL}?remove_tag=${encodeURIComponent(filename)}&tag_key=${encodeURIComponent(tagKey)}`;
                const response = await fetch(url, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                if (result.success) {
                    fetchItems(); // Refresh
                } else {
                    alert('Failed to remove tag: ' + result.error);
                }
            } catch (error) {
                console.error('Remove tag error:', error);
                alert(`Error removing tag: ${error.message}`);
            }
        }

        async function promptSetTag(filename) {
            const tagKey = prompt("Enter tag key (e.g. status):");
            if (!tagKey) return;
            const tagValue = prompt(`Enter tag value for "${tagKey}":`);
            if (tagValue === null) return;

            try {
                const url = `${API_URL}?set_tag=${encodeURIComponent(filename)}&tag_key=${encodeURIComponent(tagKey)}&tag_value=${encodeURIComponent(tagValue)}`;
                const response = await fetch(url, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                if (result.success) {
                    fetchItems(); // Refresh
                } else {
                    alert('Failed to set tag: ' + result.error);
                }
            } catch (error) {
                console.error('Set tag error:', error);
                alert(`Error setting tag: ${error.message}`);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const statusDiv = document.getElementById('upload-status');
            const uploadBtn = document.getElementById('upload-btn');

            if (!fileInput.files.length) {
                alert('Please select a file.');
                return;
            }

            const file = fileInput.files[0];
            const currentFolder = getCurrentFolder();

            statusDiv.textContent = 'Getting upload URL...';
            uploadBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        folder: currentFolder,
                        file_name: file.name
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `HTTP error! status: ${response.status}`);
                }

                const { upload_url } = await response.json();

                statusDiv.textContent = 'Uploading...';
                const uploadResponse = await fetch(upload_url, {
                    method: 'PUT',
                    body: file,
                    headers: {
                        'If-None-Match': '*'
                    }
                });

                if (uploadResponse.status === 412) {
                    statusDiv.textContent = 'Error: File already exists (Precondition Failed).';
                    statusDiv.style.color = 'red';
                } else if (!uploadResponse.ok) {
                    throw new Error(`Upload failed with status: ${uploadResponse.status}`);
                } else {
                    statusDiv.textContent = 'Upload successful!';
                    statusDiv.style.color = 'green';
                    fileInput.value = '';
                    fetchItems();
                }
            } catch (error) {
                console.error('Upload error:', error);
                statusDiv.textContent = `Error: ${error.message}`;
                statusDiv.style.color = 'red';
            } finally {
                uploadBtn.disabled = false;
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        window.onhashchange = () => fetchItems();
        fetchItems();
    </script>
</body>
</html>
